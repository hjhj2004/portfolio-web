<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>황희제 포트폴리오</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- GitHub 버튼 (프로필 화면에서만 표시) -->
<a id="github-btn" href="https://github.com/hjhj2004/portfolio-web" target="_blank" style="display: none;">GitHub</a>

<!-- 초기 화면 -->
<div id="home-screen">
    <h1>황희제</h1>
    <p id="student-id">23018102</p>
    <button id="profile-btn">프로필 보기</button>
</div>

<!-- 프로필 화면 (처음엔 숨김) -->
<div id="profile-screen" style="display: none;">

    <h2>자기소개</h2>
    <p class="intro">
        안녕하세요. 보안에 관심을 가지고 공부하고 있는 정보보호학과 4학년 황희제입니다.
        정보보호 관련 공부 중 흥미를 느껴 정보보호병으로 지원해 복무하였습니다.
        현재는 화이트햇스쿨을 수료하며 보안 기초를 다지고, 웹 개발을 함께 학습하고 있습니다.
    </p>

    <h2>기술 스택</h2>
    <ul class="skills">
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
        <li>Java</li>
        <li>Spring Boot</li>
    </ul>

    <h2>관심 분야</h2>
    <ul class="interests">
        <li>정보보안</li>
        <li>웹 해킹</li>
        <li>시스템 보안</li>
    </ul>

    <!-- 서버에서 받아오는 데이터 -->
    <h2>기본 정보</h2>
    <p>이름: <span id="name"></span></p>
    <p>학과: <span id="department"></span></p>
    <p>학년: <span id="year"></span></p>

    <h2>이력</h2>
    <ul id="history"></ul>
</div>

<script src="script.js"></script>
</body>
</html>
